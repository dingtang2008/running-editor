<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Data Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
}
.panel {
  width: 380px;
  padding: 24px;
  background: #16213e;
  overflow-y: auto;
  height: 100vh;
  flex-shrink: 0;
}
.panel h1 { font-size: 20px; margin-bottom: 20px; color: #4db890; border-bottom: 1px solid #2a3a5c; padding-bottom: 12px; }
.panel h2 { font-size: 14px; color: #8899bb; margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 1px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 13px; color: #99aabb; margin-bottom: 4px; }
.field input, .field select {
  width: 100%; padding: 8px 12px; background: #0f3460;
  border: 1px solid #2a3a5c; border-radius: 6px; color: #e0e0e0; font-size: 14px; outline: none;
}
.field input:focus, .field select:focus { border-color: #4db890; }
.row { display: flex; gap: 12px; }
.row .field { flex: 1; }
.btn {
  display: inline-block; padding: 10px 20px; background: #4db890; color: #fff;
  border: none; border-radius: 6px; font-size: 14px; cursor: pointer; margin-top: 8px; margin-right: 8px;
}
.btn:hover { background: #3da87e; }
.btn.secondary { background: #2a3a5c; }
.btn.secondary:hover { background: #3a4a6c; }
.preview { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 24px; overflow: auto; }
canvas { border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.actions { margin-top: 20px; padding-top: 16px; border-top: 1px solid #2a3a5c; }
</style>
</head>
<body>

<div class="panel">
  <h1>Running Editor</h1>

  <h2>Month</h2>
  <div class="row">
    <div class="field"><label>Year</label><input type="number" id="year" value="2026" min="2020" max="2030"></div>
    <div class="field"><label>Month</label>
      <select id="month">
        <option value="1">1</option><option value="2">2</option><option value="3" selected>3</option>
        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        <option value="10">10</option><option value="11">11</option><option value="12">12</option>
      </select>
    </div>
  </div>
  <div class="field"><label>Days: <span id="daysDisplay">31</span></label></div>

  <h2>Distance</h2>
  <div class="row">
    <div class="field"><label>This month (km)</label><input type="number" id="distThis" value="46.98" step="0.01"></div>
    <div class="field"><label>Last month (km)</label><input type="number" id="distLast" value="43.07" step="0.01"></div>
  </div>
  <div class="field"><label>Diff: <span id="diffDisplay">+3.91</span></label></div>

  <h2>Stats</h2>
  <div class="row">
    <div class="field"><label>Run count</label><input type="number" id="runCount" value="13" min="0"></div>
    <div class="field"><label>Avg pace</label><input type="text" id="avgPace" value="13'56&quot;"></div>
  </div>
  <div class="field"><label>Total time (HH:MM:SS)</label><input type="text" id="totalTime" value="10:59:40"></div>
  <div class="row">
    <div class="field"><label>Half marathon</label><input type="number" id="halfMarathon" value="1" min="0"></div>
    <div class="field"><label>Full marathon</label><input type="number" id="fullMarathon" value="0" min="0"></div>
  </div>

  <h2>Status Bar</h2>
  <div class="row">
    <div class="field"><label>Time</label><input type="text" id="statusTime" value="10:45"></div>
    <div class="field"><label>Battery %</label><input type="number" id="battery" value="67" min="0" max="100"></div>
  </div>

  <h2>Chart</h2>
  <div class="field">
    <label>Active days ratio</label>
    <input type="range" id="activeDays" min="30" max="90" value="65">
    <span id="activeDaysDisplay">65%</span>
  </div>
  <button class="btn secondary" onclick="regenerateChart()">Randomize</button>

  <div class="actions">
    <button class="btn" onclick="exportPNG()">Export PNG</button>
  </div>
</div>

<div class="preview">
  <canvas id="canvas" width="750" height="1640"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 750, H = 1640;

const C = {
  bg: '#FFFFFF',
  dark: '#1A1A1A',
  text: '#333333',
  gray: '#666666',
  lightGray: '#999999',
  divider: '#EEEEEE',
  green: '#4CD89D',
  greenLight: '#7DDDB5',
  yellow: '#F0C850',
  yellowLight: '#F5D978',
  blue: '#7BA4E8',
  blueDark: '#5B8AD8',
};

const F = {
  num:    (s) => `bold ${s}px "DIN Alternate", "Helvetica Neue", sans-serif`,
  cn:     (s) => `${s}px "PingFang SC", "Hiragino Sans GB", sans-serif`,
  cnMed:  (s) => `500 ${s}px "PingFang SC", "Hiragino Sans GB", sans-serif`,
  cnBold: (s) => `bold ${s}px "PingFang SC", "Hiragino Sans GB", sans-serif`,
  sf:     (s) => `600 ${s}px -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif`,
};

let dailyData = [];

function getDaysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

function generateDailyData() {
  const days = getDaysInMonth(getNum('year'), getNum('month'));
  const total = getNum('distThis');
  const ratio = getNum('activeDays') / 100;
  const data = new Array(days).fill(0);
  const numActive = Math.max(1, Math.round(days * ratio));
  const idx = Array.from({length: days}, (_, i) => i);
  for (let i = idx.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [idx[i], idx[j]] = [idx[j], idx[i]]; }
  const active = idx.slice(0, numActive).sort((a,b) => a - b);
  let rem = total;
  for (let i = 0; i < active.length - 1; i++) {
    const avg = rem / (active.length - i);
    const v = Math.max(0.3, avg * (0.2 + Math.random() * 1.6));
    data[active[i]] = Math.min(Math.round(v * 100) / 100, rem - 0.3 * (active.length - i - 1));
    rem -= data[active[i]];
  }
  if (active.length > 0) data[active[active.length - 1]] = Math.round(Math.max(0, rem) * 100) / 100;
  dailyData = data;
}

function regenerateChart() { generateDailyData(); draw(); }
function getVal(id) { return document.getElementById(id).value; }
function getNum(id) { return +document.getElementById(id).value; }

// ---- Canvas helpers (no ctx.roundRect - use manual paths for compatibility) ----
function rrPath(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
function fillRR(x, y, w, h, r) { if (w <= 0 || h <= 0) return; rrPath(x, y, w, h, r); ctx.fill(); }
function strokeRR(x, y, w, h, r) { if (w <= 0 || h <= 0) return; rrPath(x, y, w, h, r); ctx.stroke(); }

// ==================== iOS Status Bar ====================
function drawStatusBar() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, 54);
  const cy = 27;

  // Left: Time + location arrow (matching real iOS)
  ctx.fillStyle = C.dark;
  ctx.font = F.sf(34);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(getVal('statusTime'), 32, cy);
  // Location arrow (larger, matching iOS)
  const tw = ctx.measureText(getVal('statusTime')).width;
  ctx.save();
  ctx.translate(32 + tw + 14, cy - 2);
  ctx.rotate(-Math.PI / 4);
  ctx.beginPath();
  ctx.moveTo(0, -11);
  ctx.lineTo(8, 11);
  ctx.lineTo(0, 5);
  ctx.lineTo(-8, 11);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Right cluster: signal bars → "5G" text → battery
  const iconGap = 10;

  // Battery (rightmost): rounded rect, fill flush with outline, tiny cap
  const battery = getNum('battery');
  const bw = 40, bh = 22;
  const bx = W - 26 - bw, by = cy - bh / 2;
  const br = 6;
  // Gray filled background (full battery shape)
  ctx.fillStyle = '#D1D1D6';
  fillRR(bx, by, bw, bh, br);
  // Tiny cap on right (also gray)
  ctx.fillStyle = '#D1D1D6';
  fillRR(bx + bw + 1.5, cy - 3, 3, 6, 1.5);
  // Dark fill from left (charge level)
  const fillW = Math.max(0, Math.round(bw * battery / 100));
  if (fillW > 0) {
    ctx.save();
    rrPath(bx, by, bw, bh, br);
    ctx.clip();
    ctx.fillStyle = C.dark;
    ctx.fillRect(bx, by, fillW, bh);
    ctx.restore();
  }
  // Percentage text — white on dark, dark on gray
  ctx.font = `bold 16px -apple-system, "SF Pro Display", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText(battery.toString(), bx + bw / 2, cy + 1);

  // "5G" + small "A" text (middle)
  ctx.fillStyle = C.dark;
  ctx.textBaseline = 'middle';
  const fgRight = bx - iconGap;
  // Small "A" first (to measure position)
  ctx.font = `bold 16px -apple-system, "SF Pro Display", sans-serif`;
  const aW = ctx.measureText('A').width;
  ctx.textAlign = 'right';
  ctx.fillText('A', fgRight, cy + 2);
  // "5G" before it
  ctx.font = `bold 24px -apple-system, "SF Pro Display", sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillText('5G', fgRight - aW - 1, cy + 1);
  const fgMainW = ctx.measureText('5G').width;

  // Signal bars (leftmost): 4 thin bars like real iOS
  const fgW = fgMainW + aW + 1;
  const sigBot = cy + bh / 2;
  const barHeights = [7, 12, 17, 22];
  const barW = 4, barGap = 3;
  const totalSigW = 4 * barW + 3 * barGap;
  const sigX = fgRight - fgW - iconGap - totalSigW;
  ctx.fillStyle = C.dark;
  for (let i = 0; i < 4; i++) {
    fillRR(sigX + i * (barW + barGap), sigBot - barHeights[i], barW, barHeights[i], 1.5);
  }
}

// ==================== Nav Bar ====================
function drawNavBar() {
  const y = 68;
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, y, W, 52);

  // Back chevron
  ctx.strokeStyle = '#BBBBBB';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(46, y + 18);
  ctx.lineTo(34, y + 28);
  ctx.lineTo(46, y + 38);
  ctx.stroke();

  // Title
  ctx.fillStyle = C.dark;
  ctx.font = F.cnBold(32);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('跑步', W / 2 - 8, y + 28);

  // Dropdown triangle
  ctx.fillStyle = '#BBBBBB';
  ctx.beginPath();
  const tx = W / 2 + 28;
  ctx.moveTo(tx, y + 22);
  ctx.lineTo(tx + 12, y + 22);
  ctx.lineTo(tx + 6, y + 30);
  ctx.closePath();
  ctx.fill();

  // "分享"
  ctx.fillStyle = C.green;
  ctx.font = F.cnBold(30);
  ctx.textAlign = 'right';
  ctx.fillText('分享', W - 36, y + 28);
}

// ==================== Tab Bar ====================
function drawTabBar() {
  const y = 134;
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, y, W, 86);
  // Top divider
  ctx.fillStyle = C.divider;
  ctx.fillRect(0, y, W, 1);

  const tabs = ['总', '周', '月', '年'];
  const subs = ['总数据', '本周数据', '本月数据', '一年数据'];
  const tabW = W / 4;

  for (let i = 0; i < 4; i++) {
    const cx = tabW * i + tabW / 2;
    if (i === 2) {
      // Active: green pill
      ctx.fillStyle = C.green;
      fillRR(cx - 38, y + 14, 76, 36, 18);
      ctx.fillStyle = '#FFF';
      ctx.font = F.cnBold(28);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(tabs[i], cx, y + 31);
      ctx.fillStyle = C.green;
      ctx.font = F.cn(20);
      ctx.fillText(subs[i], cx, y + 66);
    } else {
      ctx.fillStyle = C.dark;
      ctx.font = F.cnBold(28);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(tabs[i], cx, y + 31);
      ctx.fillStyle = C.lightGray;
      ctx.font = F.cn(20);
      ctx.fillText(subs[i], cx, y + 66);
    }
  }
}

// ==================== Month Title ====================
function drawMonthTitle() {
  const y = 240;
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, y, W, 64);

  const yr = getVal('year');
  const mo = getVal('month').padStart(2, '0');

  ctx.fillStyle = C.dark;
  ctx.font = F.cnMed(28);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${yr}/${mo}`, W / 2, y + 32);

  // Left triangle
  ctx.fillStyle = C.lightGray;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 78, y + 32);
  ctx.lineTo(W / 2 - 66, y + 24);
  ctx.lineTo(W / 2 - 66, y + 40);
  ctx.closePath();
  ctx.fill();
  // Right triangle
  ctx.beginPath();
  ctx.moveTo(W / 2 + 78, y + 32);
  ctx.lineTo(W / 2 + 66, y + 24);
  ctx.lineTo(W / 2 + 66, y + 40);
  ctx.closePath();
  ctx.fill();
}

// ==================== Bar Chart ====================
function drawChart() {
  const days = getDaysInMonth(getNum('year'), getNum('month'));
  if (dailyData.length !== days) generateDailyData();

  const L = 72, R = W - 20, T = 328, B = 640;
  const cW = R - L, cH = B - T;

  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 304, W, 390);

  const maxVal = Math.max(...dailyData, 1);
  // Nice scale: round up to nearest even number for cleaner labels
  const niceMax = Math.ceil(maxVal / 2) * 2;
  const midVal = niceMax / 2;

  // Y-axis + dashed grid
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.font = F.cn(22);

  [0, midVal, niceMax].forEach(lv => {
    const ly = B - (lv / niceMax) * cH;
    ctx.fillStyle = C.lightGray;
    ctx.fillText(lv.toFixed(1), L - 10, ly);
    ctx.strokeStyle = '#E5E5E5';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(L, ly);
    ctx.lineTo(R, ly);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Find max day
  let maxDay = 0, maxDayVal = 0;
  for (let i = 0; i < days; i++) {
    if (dailyData[i] > maxDayVal) { maxDayVal = dailyData[i]; maxDay = i; }
  }

  // Draw bars
  const gap = 3;
  const barW = Math.max(3, (cW - gap * (days - 1)) / days);

  for (let i = 0; i < days; i++) {
    if (dailyData[i] <= 0) continue;
    const bx = L + i * (barW + gap);
    const bh = (dailyData[i] / niceMax) * cH;
    const by = B - bh;
    const r = Math.min(barW / 2, 3);

    const grad = ctx.createLinearGradient(bx, by, bx, B);
    if (i === maxDay) {
      grad.addColorStop(0, C.yellowLight);
      grad.addColorStop(1, C.yellow);
    } else {
      grad.addColorStop(0, C.greenLight);
      grad.addColorStop(1, C.green);
    }
    ctx.fillStyle = grad;
    fillRR(bx, by, barW, bh, r);
  }

  // Max value label (yellow color for max)
  if (maxDayVal > 0) {
    const bx = L + maxDay * (barW + gap);
    const bh = (maxDayVal / niceMax) * cH;
    const by = B - bh;
    ctx.fillStyle = '#D4A020';
    ctx.font = F.num(22);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(maxDayVal.toFixed(2), bx + barW / 2, by - 6);
  }

  // X-axis labels
  ctx.fillStyle = C.lightGray;
  ctx.font = F.cn(22);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  [1, 6, 11, 16, 21, 26, 31].filter(d => d <= days).forEach(d => {
    ctx.fillText(d.toString(), L + (d - 1) * (barW + gap) + barW / 2, B + 14);
  });
}

// ==================== Stats ====================
function drawStats() {
  const y0 = 760;
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, y0, W, 540);

  const dist = (+getVal('distThis')).toFixed(2);
  const count = getVal('runCount');
  const time = getVal('totalTime');
  const pace = getVal('avgPace');
  const halfM = getVal('halfMarathon');
  const fullM = getVal('fullMarathon');
  const LX = 40, RX = 400;

  // Divider above
  ctx.fillStyle = C.divider;
  ctx.fillRect(LX, y0, W - 2 * LX, 1);

  // ---- Row 1 ----
  let y = y0 + 38;
  ctx.fillStyle = C.gray;
  ctx.font = F.cn(26);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('累计里程', LX, y);
  ctx.fillText('累计次数', RX, y);

  y += 52;
  ctx.fillStyle = C.dark;
  ctx.font = F.num(60);
  const dw = ctx.measureText(dist).width;
  ctx.fillText(dist, LX, y);
  ctx.fillStyle = C.gray;
  ctx.font = F.cn(26);
  ctx.fillText('公里', LX + dw + 12, y + 26);

  ctx.fillStyle = C.dark;
  ctx.font = F.num(60);
  const cw = ctx.measureText(count).width;
  ctx.fillText(count, RX, y);
  ctx.fillStyle = C.gray;
  ctx.font = F.cn(26);
  ctx.fillText('次', RX + cw + 12, y + 26);

  y += 100;
  ctx.fillStyle = C.divider;
  ctx.fillRect(LX, y, W - 2 * LX, 1);

  // ---- Row 2 ----
  y += 34;
  ctx.fillStyle = C.gray;
  ctx.font = F.cn(26);
  ctx.fillText('累计时长', LX, y);
  ctx.fillText('平均配速', RX, y);

  y += 52;
  ctx.fillStyle = C.dark;
  ctx.font = F.num(60);
  ctx.fillText(time, LX, y);
  ctx.fillText(pace, RX, y);

  y += 100;
  ctx.fillStyle = C.divider;
  ctx.fillRect(LX, y, W - 2 * LX, 1);

  // ---- Row 3 ----
  y += 34;
  ctx.fillStyle = C.gray;
  ctx.font = F.cn(26);
  ctx.fillText('半马里程次数', LX, y);
  ctx.fillText('全马里程次数', RX, y);

  y += 52;
  ctx.fillStyle = C.dark;
  ctx.font = F.num(48);
  const hw = ctx.measureText(halfM).width;
  ctx.fillText(halfM, LX, y);
  ctx.fillStyle = C.gray;
  ctx.font = F.cn(26);
  ctx.fillText('次', LX + hw + 10, y + 16);

  ctx.fillStyle = C.dark;
  ctx.font = F.num(48);
  const fw = ctx.measureText(fullM).width;
  ctx.fillText(fullM, RX, y);
  ctx.fillStyle = C.gray;
  ctx.font = F.cn(26);
  ctx.fillText('次', RX + fw + 10, y + 16);

  return y + 76;
}

// ==================== Comparison ====================
function drawComparison(startY) {
  const y = startY;
  const distThis = getNum('distThis');
  const distLast = getNum('distLast');
  const diff = distThis - distLast;

  // Fill remaining space to canvas bottom
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, y, W, H - y);

  // Divider line (gray)
  ctx.fillStyle = '#DDDDDD';
  ctx.fillRect(40, y, W - 80, 3);

  // Spread content evenly in remaining space
  const contentH = H - y - 3;
  const ty = y + 3 + contentH * 0.08;

  // Title
  ctx.fillStyle = C.dark;
  ctx.font = F.cn(26);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  const diffAbs = Math.abs(diff).toFixed(2);
  const word = diff >= 0 ? '多' : '少';
  ctx.fillText(`本月跑步里程比上月${word} ${diffAbs} 公里`, 40, ty);

  // Header
  const hy = ty + contentH * 0.16;
  ctx.fillStyle = C.lightGray;
  ctx.font = F.cn(22);
  ctx.fillText('月次', 40, hy);
  ctx.fillText('里程', 120, hy);

  const barX = 120, barMaxW = 420;
  const maxD = Math.max(distThis, distLast, 1);

  // This month bar
  const r1y = hy + contentH * 0.16;
  ctx.fillStyle = C.dark;
  ctx.font = F.cnBold(26);
  ctx.fillText('本月', 40, r1y);

  const b1w = Math.max(10, (distThis / maxD) * barMaxW);
  const g1 = ctx.createLinearGradient(barX, 0, barX + b1w, 0);
  g1.addColorStop(0, '#4EC9A0');
  g1.addColorStop(1, '#A0DFC8');
  ctx.fillStyle = g1;
  fillRR(barX, r1y - 2, b1w, 32, 4);

  ctx.fillStyle = C.dark;
  ctx.font = F.num(26);
  ctx.textAlign = 'left';
  const v1x = barX + b1w + 14;
  ctx.fillText(distThis.toFixed(2), v1x, r1y + 2);
  const v1w = ctx.measureText(distThis.toFixed(2)).width;
  ctx.fillStyle = C.lightGray;
  ctx.font = F.cn(20);
  ctx.fillText('公里', v1x + v1w + 4, r1y + 6);

  // Last month bar — positioned near bottom
  const r2y = r1y + contentH * 0.2;
  ctx.fillStyle = C.dark;
  ctx.font = F.cnBold(26);
  ctx.textAlign = 'left';
  ctx.fillText('上月', 40, r2y);

  const b2w = Math.max(10, (distLast / maxD) * barMaxW);
  const g2 = ctx.createLinearGradient(barX, 0, barX + b2w, 0);
  g2.addColorStop(0, '#C8E6D8');
  g2.addColorStop(1, '#DFF0E8');
  ctx.fillStyle = g2;
  fillRR(barX, r2y - 2, b2w, 32, 4);

  ctx.fillStyle = C.dark;
  ctx.font = F.num(26);
  const v2x = barX + b2w + 14;
  ctx.fillText(distLast.toFixed(2), v2x, r2y + 2);
  const v2w = ctx.measureText(distLast.toFixed(2)).width;
  ctx.fillStyle = C.lightGray;
  ctx.font = F.cn(20);
  ctx.fillText('公里', v2x + v2w + 4, r2y + 6);
}

// ==================== Main ====================
function draw() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  document.getElementById('daysDisplay').textContent = getDaysInMonth(getNum('year'), getNum('month'));
  const d = getNum('distThis') - getNum('distLast');
  document.getElementById('diffDisplay').textContent = `${d >= 0 ? '+' : ''}${d.toFixed(2)} km`;
  document.getElementById('activeDaysDisplay').textContent = getNum('activeDays') + '%';

  drawStatusBar();
  drawNavBar();
  drawTabBar();
  drawMonthTitle();
  drawChart();
  const ey = drawStats();
  drawComparison(ey);
}

function exportPNG() {
  const a = document.createElement('a');
  a.download = `running_${getVal('year')}_${getVal('month').padStart(2,'0')}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

document.querySelectorAll('input, select').forEach(el => {
  el.addEventListener('input', draw);
  el.addEventListener('change', draw);
});

generateDailyData();
draw();
</script>
</body>
</html>
